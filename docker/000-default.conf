<VirtualHost *:80>
    DocumentRoot /var/www/html/public
    DirectoryIndex index.php index.html

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Keep the SQLite database and app config out of the web root's reach.
    # (They already live outside /public, this is defense-in-depth.)
    <Directory /var/www/html/data>
        Require all denied
    </Directory>
    <Directory /var/www/html/config>
        Require all denied
    </Directory>

    # Uploaded photos/signatures are user-supplied: serve them only as static
    # files, never execute. Defense-in-depth on top of filename hardening so a
    # planted script in uploads/ can never run.
    <Directory /var/www/html/public/uploads>
        php_admin_flag engine off
        <FilesMatch "\.(php|phtml|phar|php[0-9]|pht|cgi|pl|py|sh|htaccess)$">
            Require all denied
        </FilesMatch>
        RemoveHandler .php .phtml .phar .php3 .php4 .php5 .php7
        RemoveType .php .phtml .phar
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
